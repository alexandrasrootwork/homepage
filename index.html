<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Retro Desktop</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: "MS Sans Serif", Tahoma, sans-serif; overflow: hidden; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #008080; }
        .desktop { position: absolute; top: 0; left: 0; right: 0; bottom: 40px; overflow: auto; padding: 20px; z-index: 1; }
        .icons-container { position: relative; min-height: 100%; }
        
        /* Desktop Icon */
        .desktop-icon, .folder-icon {
            position: relative; width: 90px; text-align: center; cursor: pointer;
            padding: 8px 4px; color: white; font-size: 11px; display: inline-block;
            vertical-align: top; background: transparent; border-radius: 2px;
        }
        .desktop-icon:hover, .folder-icon:hover { background: rgba(0,0,128,0.7); outline: 1px dotted white; }
        .desktop-icon.drag-over { background: rgba(0,128,0,0.5); outline: 2px solid lime; }
        .desktop-icon .icon-img, .folder-icon .icon-img { font-size: 48px; display: block; margin-bottom: 8px; pointer-events: none; }
        .icon-label { word-break: break-word; pointer-events: none; text-shadow: 1px 1px 0 #000; }
        
        /* Action buttons */
        .icon-action-btn {
            position: absolute; top: -5px; width: 18px; height: 18px;
            background: #c0c0c0; border: 1px solid #000; border-radius: 10px;
            font-size: 11px; line-height: 16px; text-align: center;
            cursor: pointer; color: black; display: none; font-weight: bold; z-index: 10;
        }
        .delete-icon-btn { right: -5px; }
        .edit-icon-btn { left: -5px; }
        .lock-icon-btn { left: 20px; background: #000080; color: white; }
        .desktop-icon:hover .icon-action-btn, .folder-icon:hover .icon-action-btn { display: block; }
        .delete-icon-btn:hover { background: #ff0000; color: white; }
        .edit-icon-btn:hover { background: #000080; color: white; }
        
        /* Stickers */
        .sticker {
            position: absolute; cursor: move; z-index: 50;
            display: inline-block; background: transparent;
        }
        .sticker .sticker-content { font-size: 48px; display: block; }
        .sticker .delete-sticker {
            position: absolute; top: -8px; right: -8px; width: 16px; height: 16px;
            background: #c0c0c0; border: 1px solid #000; border-radius: 10px;
            font-size: 10px; text-align: center; line-height: 14px; cursor: pointer; display: none;
            z-index: 10;
        }
        .sticker:hover .delete-sticker { display: block; }
        .resize-handle {
            position: absolute; bottom: -5px; right: -5px; width: 12px; height: 12px;
            background: #c0c0c0; border: 1px solid #000; cursor: nw-resize; display: none;
        }
        .sticker:hover .resize-handle { display: block; }
        
        /* Sticky Notes Widget */
        .widget {
            position: absolute; background: #c0c0c0; border: 2px solid #fff;
            border-right-color: #000; border-bottom-color: #000; min-width: 220px;
            z-index: 100; box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }
        .widget-title-bar { background: #000080; color: white; padding: 4px 8px; display: flex; justify-content: space-between; cursor: move; font-size: 11px; }
        .widget-content { padding: 8px; background: #dcdcdc; }
        .widget-content textarea { width: 100%; height: 120px; font-family: inherit; border: 1px solid #808080; background: #ffffcc; padding: 4px; resize: vertical; font-size: 12px; }
        .close-widget { cursor: pointer; }
        
        /* Desktop Windows (for opening links) */
        .desktop-window {
            position: fixed; background: #c0c0c0; border: 2px solid #fff;
            border-right-color: #000; border-bottom-color: #000;
            min-width: 500px; min-height: 400px; z-index: 2000;
            display: flex; flex-direction: column;
        }
        .desktop-window .title-bar {
            background: #000080; color: white; padding: 6px 8px;
            display: flex; justify-content: space-between; cursor: move;
        }
        .desktop-window .window-content { flex: 1; padding: 0; overflow: auto; background: white; }
        .desktop-window iframe { width: 100%; height: 100%; border: none; }
        .window-controls span { cursor: pointer; margin-left: 8px; }
        
        /* Folder Window */
        .folder-window {
            position: fixed; background: #c0c0c0; border: 2px solid #fff;
            border-right-color: #000; border-bottom-color: #000;
            min-width: 400px; min-height: 300px; z-index: 1100;
            display: none; flex-direction: column;
        }
        .folder-window .title-bar {
            background: #000080; color: white; padding: 6px 8px;
            display: flex; justify-content: space-between; cursor: move;
        }
        .folder-window .folder-content {
            padding: 15px; background: #fff; flex: 1; overflow-y: auto;
            display: flex; flex-wrap: wrap; gap: 15px;
        }
        .folder-item { width: 80px; text-align: center; cursor: pointer; }
        .folder-item img { width: 48px; height: 48px; }
        .folder-item .folder-item-label { font-size: 10px; word-break: break-word; }
        
        /* Taskbar */
        .taskbar {
            background: #c0c0c0; border-top: 2px solid #ffffff; padding: 4px 8px;
            display: flex; align-items: center; gap: 4px; position: fixed;
            bottom: 0; left: 0; right: 0; height: 40px; z-index: 1000;
        }
        .start-button {
            background: #c0c0c0; border: 2px solid #ffffff; border-right-color: #808080;
            border-bottom-color: #808080; padding: 4px 12px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
        }
        .start-button:active { border: 2px solid #808080; border-right-color: #fff; border-bottom-color: #fff; }
        .start-menu {
            display: none; position: fixed; bottom: 40px; left: 8px;
            background: #c0c0c0; border: 2px solid #ffffff; border-right-color: #000;
            border-bottom-color: #000; min-width: 220px; z-index: 1001; padding: 4px 0;
        }
        .start-menu.show { display: block; }
        .start-menu-item { padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .start-menu-item:hover { background: #000080; color: white; }
        .start-menu-divider { height: 1px; background: #808080; margin: 4px 0; }
        .taskbar-time { margin-left: auto; background: #c0c0c0; border: 1px solid #808080; padding: 2px 8px; font-size: 11px; flex-shrink: 0; }
        .taskbar-window-btn {
            background: #c0c0c0; border: 1px solid #808080; padding: 2px 8px;
            font-size: 11px; cursor: pointer; max-width: 150px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0;
        }
        .taskbar-window-btn.active { background: #000080; color: white; }
        
        /* All Notes Viewer */
        .notes-viewer {
            position: fixed; top: 100px; left: 100px; width: 500px;
            background: #c0c0c0; border: 2px solid #fff; border-right-color: #000;
            border-bottom-color: #000; z-index: 1100; display: none; flex-direction: column;
        }
        .notes-viewer .title-bar { background: #000080; color: white; padding: 6px 8px; display: flex; justify-content: space-between; cursor: move; }
        .notes-viewer .notes-list { padding: 10px; background: #fff; max-height: 400px; overflow-y: auto; }
        .note-item { border-bottom: 1px solid #ccc; padding: 8px; margin-bottom: 5px; }
        .note-date { font-size: 10px; color: #666; }
        .note-text { font-size: 12px; margin-top: 4px; white-space: pre-wrap; }
        
        /* Modals */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #c0c0c0; border: 2px solid #fff; border-right-color: #000;
            border-bottom-color: #000; width: 380px; max-width: 90%;
        }
        .modal-title-bar { background: #000080; color: white; padding: 6px 8px; display: flex; justify-content: space-between; cursor: move; }
        .modal-body { padding: 15px; }
        .modal-body input, .modal-body textarea, .modal-body select { width: 100%; margin-bottom: 10px; padding: 5px; font-family: inherit; border: 1px solid #808080; }
        .retro-button {
            background: #c0c0c0; border: 2px solid #fff; border-right-color: #000;
            border-bottom-color: #000; padding: 5px 10px; cursor: pointer; margin-top: 5px;
        }
        .retro-button:active { border: 2px solid #000; border-right-color: #fff; border-bottom-color: #fff; }
        
        /* Other */
        .boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; justify-content: center;
            align-items: center; z-index: 10000; font-family: monospace; font-size: 20px;
        }
        .recycle-window {
            position: fixed; top: 100px; left: 100px; width: 400px;
            background: #c0c0c0; border: 2px solid #fff; border-right-color: #000;
            border-bottom-color: #000; z-index: 1100; display: none; flex-direction: column;
        }
        .recycle-window .title-bar { background: #000080; color: white; padding: 6px 8px; display: flex; justify-content: space-between; cursor: move; }
        .recycle-window .recycle-content { padding: 10px; background: #fff; max-height: 300px; overflow-y: auto; }
        
        @media (max-width: 768px) {
            .icons-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
            .desktop-icon, .folder-icon { position: static !important; width: auto; }
        }
    </style>
</head>
<body>

<div class="desktop" id="desktop">
    <div class="icons-container" id="iconsContainer"></div>
</div>

<div class="taskbar">
    <div class="start-button" id="startButton">🪟 Start</div>
    <div id="taskbarWindows" style="display: flex; gap: 4px; overflow-x: auto; flex: 1;"></div>
    <div class="taskbar-time" id="clock"></div>
</div>

<div class="start-menu" id="startMenu">
    <div class="start-menu-item" id="addIconBtn">📌 Add Icon</div>
    <div class="start-menu-item" id="addFolderBtn">📁 Add Folder</div>
    <div class="start-menu-item" id="addWidgetBtn">📋 Add Sticky Note</div>
    <div class="start-menu-item" id="addStickerBtn">✨ Add Sticker</div>
    <div class="start-menu-item" id="viewAllNotesBtn">📖 View All Notes</div>
    <div class="start-menu-divider"></div>
    <div class="start-menu-item" id="changeWallpaperBtn">🖼️ Change Wallpaper</div>
    <div class="start-menu-item" id="recycleBinBtn">🗑️ Recycle Bin</div>
    <div class="start-menu-divider"></div>
    <div class="start-menu-item" id="sortByNameBtn">🔤 Sort Icons by Name</div>
    <div class="start-menu-divider"></div>
    <div class="start-menu-item" id="legacyBtn">💾 Legacy Export</div>
    <div class="start-menu-divider"></div>
    <div class="start-menu-item" id="settingsBtn">⚙️ Settings</div>
</div>

<!-- Modals -->
<div class="modal" id="iconModal"><div class="modal-content"><div class="modal-title-bar"><span id="modalTitle">Add Icon</span><span style="cursor:pointer" id="closeModal">✗</span></div><div class="modal-body"><input type="text" id="iconLabel" placeholder="Icon name"><input type="text" id="iconLink" placeholder="Link URL (bucketlist.html)"><input type="text" id="iconImageUrl" placeholder="Emoji (📝) or image URL"><input type="password" id="iconPin" placeholder="PIN (optional)"><button id="saveIconBtn" class="retro-button">Save</button></div></div></div>

<div class="modal" id="wallpaperModal"><div class="modal-content"><div class="modal-title-bar">Change Wallpaper<span style="cursor:pointer" id="closeWallpaperModal">✗</span></div><div class="modal-body"><input type="text" id="wallpaperUrl" placeholder="Image URL"><button id="setWallpaperBtn" class="retro-button">Set</button><button id="resetWallpaperBtn" class="retro-button">Reset</button></div></div></div>

<div class="modal" id="settingsModal"><div class="modal-content"><div class="modal-title-bar">Settings<span style="cursor:pointer" id="closeSettingsModal">✗</span></div><div class="modal-body"><label><input type="checkbox" id="startupSoundToggle"> Play startup sound</label></div></div></div>

<div class="modal" id="stickerSelectorModal"><div class="modal-content"><div class="modal-title-bar">Add Sticker<span style="cursor:pointer" id="closeStickerSelectorModal">✗</span></div><div class="modal-body"><div id="emojiGrid" style="display: flex; flex-wrap: wrap; gap: 10px;"></div><input type="text" id="stickerImageUrl" placeholder="Or enter image URL" style="margin-top:10px;"><button id="addImageStickerBtn" class="retro-button">Add Image Sticker</button></div></div></div>

<div class="notes-viewer" id="notesViewer"><div class="title-bar">📖 All Sticky Notes<span style="cursor:pointer" id="closeNotesViewer">✗</span></div><div class="notes-list" id="notesList"></div></div>

<div class="recycle-window" id="recycleWindow"><div class="title-bar">🗑️ Recycle Bin<span style="cursor:pointer" id="closeRecycleWindow">✗</span></div><div class="recycle-content" id="recycleContent"></div><div style="padding:8px"><button id="emptyRecycleBtn" class="retro-button">Empty Bin</button></div></div>

<script>
    // ========== DATA ==========
    let icons = [];
    let folders = [];
    let stickers = [];
    let widgets = [];
    let recycleBin = [];
    let allNotes = [];
    let currentWallpaper = '';
    let openWindows = [];
    let nextZ = 2000;
    
    // Save/Load
    function saveAll() {
        localStorage.setItem('retroData', JSON.stringify({ icons, folders, stickers, widgets, recycleBin, allNotes, currentWallpaper }));
    }
    
    function loadAll() {
        const saved = localStorage.getItem('retroData');
        if (saved) {
            const data = JSON.parse(saved);
            icons = data.icons || [];
            folders = data.folders || [];
            stickers = data.stickers || [];
            widgets = data.widgets || [];
            recycleBin = data.recycleBin || [];
            allNotes = data.allNotes || [];
            currentWallpaper = data.currentWallpaper || '';
        }
        if (icons.length === 0) {
            icons = [
                { id: Date.now(), label: "Bucket List", link: "bucketlist.html", image: "📝", x: 30, y: 30, date: Date.now(), pin: "", folderId: null },
                { id: Date.now()+1, label: "Comfort Corner", link: "comfort.html", image: "🧸", x: 130, y: 30, date: Date.now()+1, pin: "", folderId: null },
                { id: Date.now()+2, label: "Recipes", link: "recipes.html", image: "🍳", x: 230, y: 30, date: Date.now()+2, pin: "", folderId: null },
                { id: Date.now()+3, label: "Journal", link: "journal.html", image: "📔", x: 330, y: 30, date: Date.now()+3, pin: "", folderId: null }
            ];
        }
        if (currentWallpaper) document.body.style.backgroundImage = `url(${currentWallpaper})`;
        else document.body.style.background = '#008080';
        renderAll();
    }
    
    function renderAll() {
        renderIcons();
        renderFolders();
        renderStickers();
        renderWidgets();
        updateClock();
    }
    
    function renderIcons() {
        const container = document.getElementById('iconsContainer');
        const existing = container.querySelectorAll('.desktop-icon:not(.folder-icon)');
        existing.forEach(el => el.remove());
        
        const desktopIcons = icons.filter(i => !i.folderId);
        desktopIcons.forEach(icon => {
            const div = document.createElement('div');
            div.className = 'desktop-icon';
            div.setAttribute('data-id', icon.id);
            div.setAttribute('draggable', 'true');
            const isEmoji = icon.image && (icon.image.length <= 4);
            div.innerHTML = `<div class="icon-action-btn edit-icon-btn">✏️</div>
                             <div class="icon-action-btn delete-icon-btn">✗</div>
                             ${icon.pin ? `<div class="icon-action-btn lock-icon-btn">🔒</div>` : ''}
                             ${isEmoji ? `<div class="icon-img">${icon.image}</div>` : `<img src="${icon.image}" style="width:48px; height:48px;" onerror="this.parentElement.innerHTML='<div class=icon-img>📄</div>'">`}
                             <div class="icon-label">${escapeHtml(icon.label)}</div>`;
            if (window.innerWidth > 768) {
                div.style.position = 'absolute';
                div.style.left = (icon.x || 30) + 'px';
                div.style.top = (icon.y || 30) + 'px';
            }
            container.appendChild(div);
            
            // Drag and drop for folders
            div.ondragstart = (e) => { e.dataTransfer.setData('iconId', icon.id); div.classList.add('dragging'); };
            div.ondragend = () => div.classList.remove('dragging');
            div.ondragover = (e) => e.preventDefault();
            
            div.onclick = (e) => {
                if (e.target.classList.contains('icon-action-btn')) return;
                if (icon.pin) { if (prompt('Enter PIN:') !== icon.pin) { alert('Wrong PIN'); return; } }
                if (icon.link) openWindow(icon.link, icon.label);
            };
            div.querySelector('.edit-icon-btn').onclick = (e) => { e.stopPropagation(); editIcon(icon.id); };
            div.querySelector('.delete-icon-btn').onclick = (e) => { e.stopPropagation(); deleteIcon(icon.id); };
        });
    }
    
    function renderFolders() {
        const container = document.getElementById('iconsContainer');
        const existing = container.querySelectorAll('.folder-icon');
        existing.forEach(el => el.remove());
        
        folders.forEach(folder => {
            const div = document.createElement('div');
            div.className = 'folder-icon';
            div.setAttribute('data-id', folder.id);
            div.setAttribute('draggable', 'true');
            div.innerHTML = `<div class="icon-action-btn edit-icon-btn">✏️</div>
                             <div class="icon-action-btn delete-icon-btn">✗</div>
                             ${folder.pin ? `<div class="icon-action-btn lock-icon-btn">🔒</div>` : ''}
                             <div class="icon-img">📁</div>
                             <div class="icon-label">${escapeHtml(folder.name)}</div>`;
            if (window.innerWidth > 768) {
                div.style.position = 'absolute';
                div.style.left = (folder.x || 30) + 'px';
                div.style.top = (folder.y || 30) + 'px';
            }
            container.appendChild(div);
            
            div.ondragover = (e) => e.preventDefault();
            div.ondrop = (e) => {
                e.preventDefault();
                const iconId = parseInt(e.dataTransfer.getData('iconId'));
                if (iconId) {
                    const icon = icons.find(i => i.id === iconId);
                    if (icon && !icon.folderId) {
                        icon.folderId = folder.id;
                        saveAll();
                        renderAll();
                    }
                }
            };
            
            div.onclick = (e) => {
                if (e.target.classList.contains('icon-action-btn')) return;
                openFolder(folder.id);
            };
            div.querySelector('.edit-icon-btn').onclick = (e) => { e.stopPropagation(); editFolder(folder.id); };
            div.querySelector('.delete-icon-btn').onclick = (e) => { e.stopPropagation(); deleteFolderItem(folder.id); };
        });
    }
    
    function renderStickers() {
        const existing = document.querySelectorAll('.sticker');
        existing.forEach(s => s.remove());
        stickers.forEach(sticker => {
            const div = document.createElement('div');
            div.className = 'sticker';
            div.style.left = sticker.x + 'px';
            div.style.top = sticker.y + 'px';
            div.style.width = (sticker.w || 60) + 'px';
            div.style.height = (sticker.w || 60) + 'px';
            div.innerHTML = `<div class="delete-sticker" data-id="${sticker.id}">✗</div>
                            <div class="sticker-content" style="font-size:${sticker.w || 60}px;">${sticker.isImage ? `<img src="${sticker.emoji}" style="width:100%; height:100%;">` : sticker.emoji}</div>
                            <div class="resize-handle"></div>`;
            document.querySelector('.desktop').appendChild(div);
            makeDraggable(div, sticker.id, 'sticker');
            div.querySelector('.delete-sticker').onclick = (e) => { e.stopPropagation(); stickers = stickers.filter(s => s.id !== sticker.id); saveAll(); renderStickers(); };
            
            let resizeStart = null;
            div.querySelector('.resize-handle').onmousedown = (e) => {
                e.stopPropagation();
                resizeStart = { x: e.clientX, w: sticker.w || 60 };
                document.onmousemove = (m) => {
                    if (resizeStart) {
                        const newW = Math.max(30, Math.min(200, resizeStart.w + (m.clientX - resizeStart.x)));
                        div.style.width = newW + 'px';
                        div.style.height = newW + 'px';
                        div.querySelector('.sticker-content').style.fontSize = newW + 'px';
                        sticker.w = newW;
                        saveAll();
                    }
                };
                document.onmouseup = () => { resizeStart = null; document.onmousemove = null; };
            };
        });
    }
    
    function renderWidgets() {
        const existing = document.querySelectorAll('.widget');
        existing.forEach(w => w.remove());
        widgets.forEach(widget => {
            const div = document.createElement('div');
            div.className = 'widget';
            div.style.left = widget.x + 'px';
            div.style.top = widget.y + 'px';
            div.innerHTML = `<div class="widget-title-bar"><span>📝 Note</span><span class="close-widget">✗</span></div>
                            <div class="widget-content"><textarea data-id="${widget.id}">${escapeHtml(widget.text)}</textarea></div>`;
            document.querySelector('.desktop').appendChild(div);
            makeDraggable(div, widget.id, 'widget');
            div.querySelector('.close-widget').onclick = () => { widgets = widgets.filter(w => w.id !== widget.id); saveAll(); renderWidgets(); };
            const ta = div.querySelector('textarea');
            ta.oninput = (e) => {
                widget.text = e.target.value;
                saveAll();
                allNotes.unshift({ id: Date.now(), text: e.target.value, date: new Date().toISOString() });
                if (allNotes.length > 50) allNotes.pop();
                saveAll();
            };
        });
    }
    
    function makeDraggable(el, id, type) {
        let startX, startY, startLeft, startTop;
        const handle = el.classList.contains('widget') ? el.querySelector('.widget-title-bar') : el;
        handle.onmousedown = (e) => {
            if (e.target.classList.contains('delete-sticker') || e.target.classList.contains('close-widget')) return;
            e.preventDefault();
            startX = e.clientX;
            startY = e.clientY;
            startLeft = el.offsetLeft;
            startTop = el.offsetTop;
            document.onmousemove = (m) => {
                let newLeft = startLeft + (m.clientX - startX);
                let newTop = startTop + (m.clientY - startY);
                newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - 100));
                newTop = Math.max(0, Math.min(newTop, window.innerHeight - 100));
                el.style.left = newLeft + 'px';
                el.style.top = newTop + 'px';
                if (type === 'sticker') { const s = stickers.find(i => i.id === id); if (s) { s.x = newLeft; s.y = newTop; } }
                if (type === 'widget') { const w = widgets.find(i => i.id === id); if (w) { w.x = newLeft; w.y = newTop; } }
            };
            document.onmouseup = () => { document.onmousemove = null; saveAll(); };
        };
    }
    
    function openWindow(url, title) {
        const winId = 'win_' + Date.now();
        const win = document.createElement('div');
        win.className = 'desktop-window';
        win.id = winId;
        win.style.left = '100px';
        win.style.top = '80px';
        win.style.width = '700px';
        win.style.height = '500px';
        win.style.zIndex = nextZ++;
        win.innerHTML = `<div class="title-bar"><span>${escapeHtml(title)}</span><div class="window-controls"><span class="maximize">□</span><span class="close">✗</span></div></div>
                        <div class="window-content"><iframe src="${url}"></iframe></div>`;
        document.body.appendChild(win);
        
        let startX, startY, startLeft, startTop;
        win.querySelector('.title-bar').onmousedown = (e) => {
            if (e.target.classList.contains('close') || e.target.classList.contains('maximize')) return;
            e.preventDefault();
            startX = e.clientX;
            startY = e.clientY;
            startLeft = win.offsetLeft;
            startTop = win.offsetTop;
            document.onmousemove = (m) => {
                win.style.left = (startLeft + (m.clientX - startX)) + 'px';
                win.style.top = (startTop + (m.clientY - startY)) + 'px';
            };
            document.onmouseup = () => { document.onmousemove = null; };
        };
        win.querySelector('.close').onclick = () => { win.remove(); updateTaskbar(); };
        win.querySelector('.maximize').onclick = () => {
            if (win.style.width === '100%') {
                win.style.width = '700px'; win.style.height = '500px';
                win.style.left = '100px'; win.style.top = '80px';
            } else {
                win.style.width = '100%'; win.style.height = 'calc(100% - 50px)';
                win.style.left = '0'; win.style.top = '0';
            }
        };
        win.onclick = () => win.style.zIndex = nextZ++;
        
        const taskbarBtn = document.createElement('div');
        taskbarBtn.className = 'taskbar-window-btn';
        taskbarBtn.innerText = title;
        taskbarBtn.onclick = () => { win.style.zIndex = nextZ++; win.style.display = 'flex'; updateActiveTaskbar(taskbarBtn); };
        document.getElementById('taskbarWindows').appendChild(taskbarBtn);
        openWindows.push({ id: winId, btn: taskbarBtn, win });
        updateActiveTaskbar(taskbarBtn);
    }
    
    function updateTaskbar() {
        openWindows = openWindows.filter(w => document.getElementById(w.id));
        document.getElementById('taskbarWindows').innerHTML = '';
        openWindows.forEach(w => document.getElementById('taskbarWindows').appendChild(w.btn));
    }
    
    function updateActiveTaskbar(activeBtn) {
        document.querySelectorAll('.taskbar-window-btn').forEach(btn => btn.classList.remove('active'));
        activeBtn.classList.add('active');
    }
    
    function openFolder(id) {
        const folder = folders.find(f => f.id === id);
        if (!folder) return;
        if (folder.pin && prompt('Enter folder PIN:') !== folder.pin) { alert('Wrong PIN'); return; }
        
        let win = document.getElementById(`folder-${id}`);
        if (win) { win.style.display = 'flex'; return; }
        
        win = document.createElement('div');
        win.className = 'folder-window';
        win.id = `folder-${id}`;
        win.style.left = '150px';
        win.style.top = '150px';
        win.style.width = '500px';
        win.style.height = '400px';
        win.style.zIndex = nextZ++;
        win.innerHTML = `<div class="title-bar"><span>📁 ${escapeHtml(folder.name)}</span><span class="close-folder">✗</span></div>
                        <div class="folder-content" id="folderContent-${id}"></div>`;
        document.body.appendChild(win);
        
        let startX, startY, startLeft, startTop;
        win.querySelector('.title-bar').onmousedown = (e) => {
            if (e.target.classList.contains('close-folder')) return;
            e.preventDefault();
            startX = e.clientX; startY = e.clientY;
            startLeft = win.offsetLeft; startTop = win.offsetTop;
            document.onmousemove = (m) => {
                win.style.left = (startLeft + (m.clientX - startX)) + 'px';
                win.style.top = (startTop + (m.clientY - startY)) + 'px';
            };
            document.onmouseup = () => { document.onmousemove = null; };
        };
        win.querySelector('.close-folder').onclick = () => win.remove();
        
        const content = document.getElementById(`folderContent-${id}`);
        const folderIcons = icons.filter(i => i.folderId === id);
        content.innerHTML = '';
        folderIcons.forEach(icon => {
            const iconDiv = document.createElement('div');
            iconDiv.className = 'folder-item';
            const isEmoji = icon.image && icon.image.length <= 4;
            iconDiv.innerHTML = `${isEmoji ? `<div style="font-size:48px;">${icon.image}</div>` : `<img src="${icon.image}" onerror="this.src=''">`}
                                <div class="folder-item-label">${escapeHtml(icon.label)}</div>
                                <button class="retro-button" style="font-size:9px; padding:2px 4px; margin-top:4px;" onclick="moveIconToDesktop(${icon.id})">📤 Move</button>`;
            iconDiv.onclick = (e) => { if (!e.target.tagName === 'BUTTON') { if (icon.link) openWindow(icon.link, icon.label); } };
            content.appendChild(iconDiv);
        });
        if (folderIcons.length === 0) content.innerHTML = '<div style="padding:20px; text-align:center;">Empty — drag icons onto the folder on desktop</div>';
        win.style.display = 'flex';
    }
    
    window.moveIconToDesktop = function(iconId) {
        const icon = icons.find(i => i.id === iconId);
        if (icon) { icon.folderId = null; saveAll(); renderAll(); }
    };
    
    function editIcon(id) {
        const icon = icons.find(i => i.id === id);
        if (!icon) return;
        const newLabel = prompt('New name:', icon.label);
        if (newLabel) icon.label = newLabel;
        const newLink = prompt('New link:', icon.link);
        if (newLink !== null) icon.link = newLink;
        const newPin = prompt('New PIN (leave blank to remove):', icon.pin);
        icon.pin = newPin || '';
        saveAll(); renderAll();
    }
    
    function deleteIcon(id) {
        if (confirm('Move to recycle bin?')) {
            const icon = icons.find(i => i.id === id);
            if (icon) { recycleBin.push({ ...icon }); icons = icons.filter(i => i.id !== id); saveAll(); renderAll(); }
        }
    }
    
    function editFolder(id) {
        const folder = folders.find(f => f.id === id);
        if (!folder) return;
        const newName = prompt('New folder name:', folder.name);
        if (newName) folder.name = newName;
        const newPin = prompt('New PIN (leave blank to remove):', folder.pin);
        folder.pin = newPin || '';
        saveAll(); renderAll();
    }
    
    function deleteFolderItem(id) {
        if (confirm('Move folder to recycle bin?')) {
            const folder = folders.find(f => f.id === id);
            if (folder) { recycleBin.push({ ...folder, isFolder: true }); folders = folders.filter(f => f.id !== id); saveAll(); renderAll(); }
        }
    }
    
    function addFolder() {
        const name = prompt('Folder name:');
        if (!name) return;
        const pin = prompt('PIN (optional):');
        folders.push({ id: Date.now(), name, pin: pin || '', x: 50 + folders.length * 100, y: 50, date: Date.now() });
        saveAll(); renderAll();
    }
    
    function addWidget() {
        widgets.push({ id: Date.now(), text: '', x: 100, y: 100 });
        saveAll(); renderAll();
    }
    
    function showRecycleBin() {
        const win = document.getElementById('recycleWindow');
        const content = document.getElementById('recycleContent');
        content.innerHTML = recycleBin.map(item => `<div style="padding:5px; border-bottom:1px solid #ccc;">${item.label || item.name} <button onclick="restoreItem(${item.id})">Restore</button></div>`).join('') || '<div>Empty</div>';
        win.style.display = 'flex';
    }
    
    window.restoreItem = function(id) {
        const item = recycleBin.find(i => i.id === id);
        if (item) {
            if (item.isFolder) folders.push({ ...item, id: Date.now() });
            else icons.push({ ...item, id: Date.now(), folderId: null });
            recycleBin = recycleBin.filter(i => i.id !== id);
            saveAll(); renderAll(); showRecycleBin();
        }
    };
    
    function emptyRecycleBin() { if (confirm('Permanently delete all?')) { recycleBin = []; saveAll(); renderAll(); showRecycleBin(); } }
    function changeWallpaper() { const url = document.getElementById('wallpaperUrl').value; if (url) { currentWallpaper = url; document.body.style.backgroundImage = `url(${url})`; document.body.style.backgroundSize = 'cover'; saveAll(); } }
    function resetWallpaper() { currentWallpaper = ''; document.body.style.backgroundImage = ''; document.body.style.background = '#008080'; saveAll(); }
    function sortByName() { icons.sort((a,b) => a.label.localeCompare(b.label)); saveAll(); renderAll(); }
    function legacyExport() { const data = { icons, folders, stickers, widgets, recycleBin, allNotes }; const blob = new Blob([JSON.stringify(data)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup-${new Date().toISOString().split('T')[0]}.json`; a.click(); }
    function viewAllNotes() { const viewer = document.getElementById('notesViewer'); const list = document.getElementById('notesList'); list.innerHTML = allNotes.map(n => `<div class="note-item"><div class="note-date">${new Date(n.date).toLocaleString()}</div><div class="note-text">${escapeHtml(n.text)}</div></div>`).join('') || '<div>No notes yet</div>'; viewer.style.display = 'flex'; }
    function showStickerSelector() { document.getElementById('stickerSelectorModal').style.display = 'flex'; const grid = document.getElementById('emojiGrid'); grid.innerHTML = ['🌟','🎵','☕','🌸','🕯️','🧸','✨','🌙','❤️','🎨','📷','🌿','🍂','⭐','🌈','🍀','☀️','❄️'].map(e => `<button style="font-size:32px; margin:5px; cursor:pointer;">${e}</button>`).join(''); grid.querySelectorAll('button').forEach(btn => btn.onclick = () => { stickers.push({ id: Date.now(), emoji: btn.textContent, isImage: false, x: Math.random() * (window.innerWidth-200), y: Math.random() * (window.innerHeight-200), w: 60 }); saveAll(); renderStickers(); document.getElementById('stickerSelectorModal').style.display = 'none'; }); }
    function addImageSticker() { const url = document.getElementById('stickerImageUrl').value; if (url) { stickers.push({ id: Date.now(), emoji: url, isImage: true, x: Math.random() * (window.innerWidth-200), y: Math.random() * (window.innerHeight-200), w: 80 }); saveAll(); renderStickers(); document.getElementById('stickerSelectorModal').style.display = 'none'; } }
    
    function playStartupSound() { if (document.getElementById('startupSoundToggle')?.checked) { const audio = new Audio('https://www.soundjay.com/misc/sounds/windows-startup-1.mp3'); audio.volume = 0.2; audio.play().catch(()=>console.log('click first')); } }
    function startBoot() { const boot = document.createElement('div'); boot.className = 'boot-screen'; boot.innerHTML = 'Starting Windows 95...'; document.body.appendChild(boot); setTimeout(() => boot.remove(), 2000); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
    
    // Event listeners
    document.getElementById('startButton').onclick = () => document.getElementById('startMenu').classList.toggle('show');
    document.addEventListener('click', (e) => { if (!document.getElementById('startButton').contains(e.target)) document.getElementById('startMenu').classList.remove('show'); });
    document.getElementById('addIconBtn').onclick = () => { document.getElementById('iconModal').style.display = 'flex'; document.getElementById('modalTitle').innerText = 'Add Icon'; document.getElementById('iconLabel').value = ''; document.getElementById('iconLink').value = ''; document.getElementById('iconImageUrl').value = ''; document.getElementById('iconPin').value = ''; };
    document.getElementById('saveIconBtn').onclick = () => { const label = document.getElementById('iconLabel').value; if (!label) return; icons.push({ id: Date.now(), label, link: document.getElementById('iconLink').value || '#', image: document.getElementById('iconImageUrl').value || '📄', pin: document.getElementById('iconPin').value, x: 50, y: 50, date: Date.now(), folderId: null }); saveAll(); renderAll(); document.getElementById('iconModal').style.display = 'none'; };
    document.getElementById('addFolderBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); addFolder(); };
    document.getElementById('addWidgetBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); addWidget(); };
    document.getElementById('addStickerBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); showStickerSelector(); };
    document.getElementById('viewAllNotesBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); viewAllNotes(); };
    document.getElementById('changeWallpaperBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); document.getElementById('wallpaperModal').style.display = 'flex'; };
    document.getElementById('setWallpaperBtn').onclick = () => { changeWallpaper(); document.getElementById('wallpaperModal').style.display = 'none'; };
    document.getElementById('resetWallpaperBtn').onclick = () => { resetWallpaper(); document.getElementById('wallpaperModal').style.display = 'none'; };
    document.getElementById('recycleBinBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); showRecycleBin(); };
    document.getElementById('sortByNameBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); sortByName(); };
    document.getElementById('legacyBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); legacyExport(); };
    document.getElementById('settingsBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); document.getElementById('settingsModal').style.display = 'flex'; };
    document.getElementById('addImageStickerBtn').onclick = addImageSticker;
    document.getElementById('closeModal').onclick = () => document.getElementById('iconModal').style.display = 'none';
    document.getElementById('closeWallpaperModal').onclick = () => document.getElementById('wallpaperModal').style.display = 'none';
    document.getElementById('closeSettingsModal').onclick = () => document.getElementById('settingsModal').style.display = 'none';
    document.getElementById('closeStickerSelectorModal').onclick = () => document.getElementById('stickerSelectorModal').style.display = 'none';
    document.getElementById('closeNotesViewer').onclick = () => document.getElementById('notesViewer').style.display = 'none';
    document.getElementById('closeRecycleWindow').onclick = () => document.getElementById('recycleWindow').style.display = 'none';
    document.getElementById('emptyRecycleBtn').onclick = emptyRecycleBin;
    
    loadAll();
    startBoot();
    setTimeout(() => playStartupSound(), 1000);
    setInterval(updateClock, 1000);
</script>
</body>
</html>
