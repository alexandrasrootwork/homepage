<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Retro Desktop</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Prevents text selection while dragging */
        }

        body {
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: background-image 0.3s ease;
        }

        /* Desktop Area */
        .desktop {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 40px;
            overflow: auto;
            padding: 20px;
            z-index: 1;
        }

        .icons-container {
            position: relative;
            min-height: 100%;
        }

        /* Desktop Icon */
        .desktop-icon, .folder-icon {
            position: relative;
            width: 90px;
            text-align: center;
            cursor: pointer;
            padding: 8px 4px;
            color: white;
            font-size: 11px;
            transition: all 0.05s ease;
            display: inline-block;
            vertical-align: top;
            background: transparent;
            border-radius: 2px;
        }

        .desktop-icon:hover, .folder-icon:hover {
            background: rgba(0,0,128,0.7);
            outline: 1px dotted #ffffff;
            outline-offset: -1px;
        }

        .desktop-icon.dragging {
            opacity: 0.6;
            cursor: grabbing;
        }

        .desktop-icon .icon-img, .folder-icon .icon-img {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
            pointer-events: none;
        }

        .desktop-icon img, .folder-icon img {
            width: 48px;
            height: 48px;
            display: block;
            margin: 0 auto 8px;
            image-rendering: pixelated;
            pointer-events: none;
        }

        .icon-label {
            word-break: break-word;
            pointer-events: none;
            text-shadow: 1px 1px 0 #000;
        }

        /* Action buttons */
        .icon-action-btn {
            position: absolute;
            top: -5px;
            width: 18px;
            height: 18px;
            background: #c0c0c0;
            border: 1px solid #000;
            border-radius: 10px;
            font-size: 11px;
            line-height: 16px;
            text-align: center;
            cursor: pointer;
            color: black;
            display: none;
            font-weight: bold;
            z-index: 10;
        }

        .delete-icon-btn { right: -5px; }
        .edit-icon-btn { left: -5px; }

        .desktop-icon:hover .icon-action-btn,
        .folder-icon:hover .icon-action-btn,
        .desktop-icon.long-press .icon-action-btn {
            display: block;
        }

        .delete-icon-btn:hover { background: #ff0000; color: white; }
        .edit-icon-btn:hover { background: #000080; color: white; }

        /* Stickers (aesthetic decorations) */
        .sticker {
            position: absolute;
            cursor: move;
            z-index: 50;
            font-size: 48px;
            transition: transform 0.1s ease;
        }
        .sticker:hover {
            transform: scale(1.05);
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }
        .sticker .delete-sticker {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 16px;
            height: 16px;
            background: #c0c0c0;
            border: 1px solid #000;
            border-radius: 10px;
            font-size: 10px;
            text-align: center;
            line-height: 14px;
            cursor: pointer;
            display: none;
            color: black;
        }
        .sticker:hover .delete-sticker {
            display: block;
        }

        /* Widgets */
        .widget {
            position: absolute;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            min-width: 180px;
            z-index: 100;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }
        .widget-title-bar {
            background: #000080;
            color: white;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            cursor: move;
            font-size: 11px;
        }
        .widget-content {
            padding: 8px;
            font-size: 11px;
            background: #dcdcdc;
        }
        .widget-content textarea {
            width: 100%;
            height: 80px;
            font-family: inherit;
            border: 1px solid #808080;
        }
        .close-widget {
            cursor: pointer;
        }

        /* Taskbar */
        .taskbar {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            z-index: 1000;
        }

        .start-button {
            background: #c0c0c0;
            border: 2px solid #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 4px 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .start-button:active {
            border: 2px solid #808080;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
        }

        .start-menu {
            display: none;
            position: fixed;
            bottom: 40px;
            left: 8px;
            background: #c0c0c0;
            border: 2px solid #ffffff;
            border-right-color: #000;
            border-bottom-color: #000;
            min-width: 220px;
            z-index: 1001;
            padding: 4px 0;
        }
        .start-menu.show { display: block; }
        .start-menu-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .start-menu-item:hover { background: #000080; color: white; }
        .start-menu-divider { height: 1px; background: #808080; margin: 4px 0; }

        .taskbar-time {
            margin-left: auto;
            background: #c0c0c0;
            border: 1px solid #808080;
            padding: 2px 8px;
            font-size: 11px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            width: 380px;
            max-width: 90%;
        }
        .modal-title-bar {
            background: #000080;
            color: white;
            padding: 6px 8px;
            display: flex;
            justify-content: space-between;
            cursor: move;
        }
        .modal-body { padding: 15px; }
        .modal-body input, .modal-body textarea, .modal-body select {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
            font-family: inherit;
            border: 1px solid #808080;
        }
        .retro-button {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 5px 10px;
            cursor: pointer;
            margin-top: 5px;
        }
        .retro-button:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        /* Boot Screen */
        .boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            font-family: monospace;
            font-size: 20px;
        }

        /* Screen Saver */
        .screensaver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .screensaver.active { display: flex; }
        .screensaver-text {
            color: #0f0;
            font-family: monospace;
            font-size: 48px;
            animation: float 3s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Recycle Bin Window */
        .recycle-window {
            position: fixed;
            top: 100px;
            left: 100px;
            width: 400px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            z-index: 1100;
            display: none;
        }
        .recycle-window .title-bar { background: #000080; color: white; padding: 4px 8px; cursor: move; display: flex; justify-content: space-between; }
        .recycle-window .content { padding: 10px; max-height: 300px; overflow-y: auto; background: #fff; }

        /* Folder Window */
        .folder-window {
            position: fixed;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            min-width: 300px;
            min-height: 200px;
            z-index: 1100;
            display: none;
        }
        .folder-window .title-bar { background: #000080; color: white; padding: 4px 8px; cursor: move; display: flex; justify-content: space-between; }
        .folder-window .content { padding: 10px; background: #fff; min-height: 150px; }
        .folder-icon { display: inline-block; margin: 10px; }

        /* Mobile */
        @media (max-width: 768px) {
            .icons-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 10px; }
            .desktop-icon, .folder-icon { position: static !important; width: auto; margin: 0 auto; }
            .icon-action-btn { display: none; }
            .desktop-icon.long-press .icon-action-btn { display: block; }
            .widget { position: static !important; margin: 10px 0; }
            .sticker { position: absolute; }
        }

        /* Seasonal themes */
        body.theme-christmas { background: #8B0000 !important; }
        body.theme-halloween { background: #FF6600 !important; }
        body.theme-valentines { background: #FF69B4 !important; }
        body.theme-autumn { background: #B8860B !important; }
    </style>
</head>
<body>

<div class="desktop" id="desktop">
    <div class="icons-container" id="iconsContainer"></div>
</div>

<div class="taskbar">
    <div class="start-button" id="startButton">🪟 Start</div>
    <div class="taskbar-time" id="clock"></div>
</div>

<div class="start-menu" id="startMenu">
    <div class="start-menu-item" id="addIconBtn">📌 Add Icon</div>
    <div class="start-menu-item" id="addFolderBtn">📁 Add Folder</div>
    <div class="start-menu-item" id="addWidgetBtn">📋 Add Sticky Note</div>
    <div class="start-menu-item" id="addStickerBtn">✨ Add Sticker</div>
    <div class="start-menu-divider"></div>
    <div class="start-menu-item" id="changeWallpaperBtn">🖼️ Change Wallpaper</div>
    <div class="start-menu-item" id="changeThemeBtn">🎨 Change Theme</div>
    <div class="start-menu-item" id="recycleBinBtn">🗑️ Recycle Bin</div>
    <div class="start-menu-divider"></div>
    <div class="start-menu-item" id="sortByNameBtn">🔤 Sort Icons by Name</div>
    <div class="start-menu-item" id="sortByDateBtn">📅 Sort by Date</div>
    <div class="start-menu-divider"></div>
    <div class="start-menu-item" id="stickerBoardBtn">🏆 Sticker Board</div>
    <div class="start-menu-item" id="legacyBtn">💾 Legacy Export</div>
    <div class="start-menu-divider"></div>
    <div class="start-menu-item" id="settingsBtn">⚙️ Settings</div>
</div>

<!-- Modals -->
<div class="modal" id="iconModal"><div class="modal-content" id="modalContent"><div class="modal-title-bar" id="modalTitleBar"><span id="modalTitle">Add Icon</span><span style="cursor:pointer" id="closeModal">✗</span></div><div class="modal-body"><input type="text" id="iconLabel" placeholder="Name (e.g., Bucket List)"><input type="text" id="iconLink" placeholder="Link URL (bucketlist.html or https://...)"><input type="text" id="iconImageUrl" placeholder="Emoji (📝) or image URL"><button id="saveIconBtn" class="retro-button">Save</button></div></div></div>

<div class="modal" id="wallpaperModal"><div class="modal-content"><div class="modal-title-bar">Change Wallpaper<span style="cursor:pointer" id="closeWallpaperModal">✗</span></div><div class="modal-body"><input type="text" id="wallpaperUrl" placeholder="Image URL"><button id="setWallpaperBtn" class="retro-button">Set Wallpaper</button><button id="resetWallpaperBtn" class="retro-button">Reset to Default</button></div></div></div>

<div class="modal" id="themeModal"><div class="modal-content"><div class="modal-title-bar">Theme Colors<span style="cursor:pointer" id="closeThemeModal">✗</span></div><div class="modal-body"><select id="themeSelect"><option value="teal">Windows 95 Teal</option><option value="silver">Classic Silver</option><option value="christmas">Christmas</option><option value="halloween">Halloween</option><option value="valentines">Valentine's Day</option><option value="autumn">Autumn</option></select><button id="applyThemeBtn" class="retro-button">Apply</button></div></div></div>

<div class="modal" id="settingsModal"><div class="modal-content"><div class="modal-title-bar">Settings<span style="cursor:pointer" id="closeSettingsModal">✗</span></div><div class="modal-body"><label><input type="checkbox" id="startupSoundToggle"> Play startup sound</label><br><br><label>PIN Lock: <input type="password" id="pinInput" placeholder="Set PIN (optional)"></label><br><button id="savePinBtn" class="retro-button">Save PIN</button><button id="clearPinBtn" class="retro-button">Clear PIN</button></div></div></div>

<div class="modal" id="stickerBoardModal"><div class="modal-content"><div class="modal-title-bar">Sticker Board<span style="cursor:pointer" id="closeStickerBoardModal">✗</span></div><div class="modal-body"><div id="stickerCollection" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 10px;"></div><button id="closeStickerBoardBtn" class="retro-button">Close</button></div></div></div>

<div class="recycle-window" id="recycleWindow"><div class="title-bar" id="recycleTitleBar">🗑️ Recycle Bin<span style="cursor:pointer" id="closeRecycleWindow">✗</span></div><div class="content" id="recycleContent"></div><div style="padding:8px"><button id="emptyRecycleBtn" class="retro-button">Empty Bin</button></div></div>

<div class="screensaver" id="screensaver"><div class="screensaver-text">✨ ~ Dreaming ~ ✨</div></div>

<script>
    // ========== DATA STRUCTURES ==========
    let icons = [];
    let folders = [];
    let stickers = [];
    let widgets = [];
    let recycleBin = [];
    let stickerBoard = []; // Achieved stickers
    let currentWallpaper = '';
    let currentTheme = 'teal';
    let userId = localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 9);
    let idleTimer;
    let screensaverActive = false;
    let pinHash = localStorage.getItem('pinHash') || '';

    // Save all data
    function saveAll() {
        const allData = { icons, folders, stickers, widgets, recycleBin, stickerBoard, currentWallpaper, currentTheme, userId };
        localStorage.setItem('retroDesktop', JSON.stringify(allData));
        try { window.parent.postMessage({ type: 'RSYNC', data: allData }, '*'); } catch(e) {}
    }

    function loadAll() {
        const saved = localStorage.getItem('retroDesktop');
        if (saved) {
            const data = JSON.parse(saved);
            icons = data.icons || [];
            folders = data.folders || [];
            stickers = data.stickers || [];
            widgets = data.widgets || [];
            recycleBin = data.recycleBin || [];
            stickerBoard = data.stickerBoard || [];
            currentWallpaper = data.currentWallpaper || '';
            currentTheme = data.currentTheme || 'teal';
        }
        if (icons.length === 0) {
            icons = [
                { id: Date.now(), label: "Bucket List", link: "bucketlist.html", image: "📝", x: 30, y: 30, dateAdded: Date.now() },
                { id: Date.now()+1, label: "Comfort Corner", link: "comfort.html", image: "🧸", x: 130, y: 30, dateAdded: Date.now()+1 },
                { id: Date.now()+2, label: "Recipes", link: "recipes.html", image: "🍳", x: 230, y: 30, dateAdded: Date.now()+2 },
                { id: Date.now()+3, label: "Journal", link: "journal.html", image: "📔", x: 330, y: 30, dateAdded: Date.now()+3 }
            ];
        }
        applyTheme();
        if (currentWallpaper) document.body.style.backgroundImage = `url(${currentWallpaper})`;
        else document.body.style.background = '#008080';
        renderAll();
    }

    function renderAll() {
        renderIcons();
        renderFolders();
        renderStickers();
        renderWidgets();
        updateClock();
    }

    function renderIcons() {
        const container = document.getElementById('iconsContainer');
        if (!container) return;
        const existingIcons = container.querySelectorAll('.desktop-icon:not(.folder-icon)');
        existingIcons.forEach(el => el.remove());

        icons.forEach(icon => {
            const iconDiv = document.createElement('div');
            iconDiv.className = 'desktop-icon';
            iconDiv.setAttribute('data-id', icon.id);
            const isEmoji = icon.image && (icon.image.length <= 4 || /[\u{1F300}-\u{1F9FF}]/u.test(icon.image));
            iconDiv.innerHTML = `<div class="icon-action-btn edit-icon-btn" data-id="${icon.id}" data-action="edit">✏️</div>
                                 <div class="icon-action-btn delete-icon-btn" data-id="${icon.id}" data-action="delete">✗</div>
                                 ${isEmoji ? `<div class="icon-img">${icon.image || '📄'}</div>` : `<img src="${icon.image}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=icon-img>📄</div>'">`}
                                 <div class="icon-label">${escapeHtml(icon.label)}</div>`;
            if (window.innerWidth > 768) {
                iconDiv.style.position = 'absolute';
                iconDiv.style.left = (icon.x || 30) + 'px';
                iconDiv.style.top = (icon.y || 30) + 'px';
                iconDiv.style.margin = '0';
                makeDraggable(iconDiv, icon.id, 'icon');
            }
            container.appendChild(iconDiv);
        });
        attachIconEvents();
    }

    function renderFolders() {
        const container = document.getElementById('iconsContainer');
        if (!container) return;
        const existingFolders = container.querySelectorAll('.folder-icon');
        existingFolders.forEach(el => el.remove());

        folders.forEach(folder => {
            const folderDiv = document.createElement('div');
            folderDiv.className = 'folder-icon';
            folderDiv.setAttribute('data-id', folder.id);
            folderDiv.innerHTML = `<div class="icon-action-btn edit-icon-btn" data-id="${folder.id}" data-action="editFolder">✏️</div>
                                   <div class="icon-action-btn delete-icon-btn" data-id="${folder.id}" data-action="deleteFolder">✗</div>
                                   <div class="icon-img">📁</div>
                                   <div class="icon-label">${escapeHtml(folder.name)}</div>`;
            if (window.innerWidth > 768) {
                folderDiv.style.position = 'absolute';
                folderDiv.style.left = (folder.x || 30) + 'px';
                folderDiv.style.top = (folder.y || 30) + 'px';
                makeDraggable(folderDiv, folder.id, 'folder');
            }
            container.appendChild(folderDiv);
        });
        attachFolderEvents();
    }

    function renderStickers() {
        const existing = document.querySelectorAll('.sticker:not(.widget)');
        existing.forEach(s => s.remove());
        stickers.forEach(sticker => {
            const stickerDiv = document.createElement('div');
            stickerDiv.className = 'sticker';
            stickerDiv.style.left = sticker.x + 'px';
            stickerDiv.style.top = sticker.y + 'px';
            stickerDiv.style.position = 'absolute';
            stickerDiv.innerHTML = `<div class="delete-sticker" data-id="${sticker.id}">✗</div>${sticker.emoji}`;
            document.querySelector('.desktop').appendChild(stickerDiv);
            makeDraggable(stickerDiv, sticker.id, 'sticker');
            stickerDiv.querySelector('.delete-sticker')?.addEventListener('click', (e) => {
                e.stopPropagation();
                stickers = stickers.filter(s => s.id !== sticker.id);
                saveAll();
                renderStickers();
            });
        });
    }

    function renderWidgets() {
        const existing = document.querySelectorAll('.widget');
        existing.forEach(w => w.remove());
        widgets.forEach(widget => {
            const widgetDiv = document.createElement('div');
            widgetDiv.className = 'widget';
            widgetDiv.style.left = widget.x + 'px';
            widgetDiv.style.top = widget.y + 'px';
            widgetDiv.innerHTML = `<div class="widget-title-bar"><span>📝 Sticky Note</span><span class="close-widget" data-id="${widget.id}">✗</span></div>
                                   <div class="widget-content"><textarea data-id="${widget.id}">${escapeHtml(widget.text)}</textarea></div>`;
            document.querySelector('.desktop').appendChild(widgetDiv);
            makeDraggable(widgetDiv, widget.id, 'widget');
            widgetDiv.querySelector('.close-widget').addEventListener('click', () => {
                widgets = widgets.filter(w => w.id !== widget.id);
                saveAll();
                renderWidgets();
            });
            widgetDiv.querySelector('textarea').addEventListener('change', (e) => {
                widget.text = e.target.value;
                saveAll();
            });
        });
    }

    function attachIconEvents() {
        document.querySelectorAll('.desktop-icon').forEach(el => {
            el.addEventListener('click', (e) => { if (!e.target.classList.contains('icon-action-btn')) { const id = parseInt(el.dataset.id); const icon = icons.find(i => i.id === id); if (icon && icon.link) window.location.href = icon.link; } });
            el.addEventListener('contextmenu', (e) => { e.preventDefault(); openEditModal(parseInt(el.dataset.id)); return false; });
            el.addEventListener('dblclick', () => openEditModal(parseInt(el.dataset.id)));
            let pressTimer; el.addEventListener('touchstart', () => { pressTimer = setTimeout(() => { el.classList.add('long-press'); openEditModal(parseInt(el.dataset.id)); }, 800); });
            el.addEventListener('touchend', () => { clearTimeout(pressTimer); setTimeout(() => el.classList.remove('long-press'), 100); });
            el.querySelector('.edit-icon-btn')?.addEventListener('click', (e) => { e.stopPropagation(); openEditModal(parseInt(el.dataset.id)); });
            el.querySelector('.delete-icon-btn')?.addEventListener('click', (e) => { e.stopPropagation(); deleteIcon(parseInt(el.dataset.id)); });
        });
    }

    function attachFolderEvents() {
        document.querySelectorAll('.folder-icon').forEach(el => {
            el.addEventListener('click', (e) => { if (!e.target.classList.contains('icon-action-btn')) openFolder(parseInt(el.dataset.id)); });
            el.querySelector('.edit-icon-btn')?.addEventListener('click', (e) => { e.stopPropagation(); editFolderName(parseInt(el.dataset.id)); });
            el.querySelector('.delete-icon-btn')?.addEventListener('click', (e) => { e.stopPropagation(); deleteFolder(parseInt(el.dataset.id)); });
        });
    }

    function makeDraggable(element, id, type) {
        let pos1=0,pos2=0,pos3=0,pos4=0;
        element.onmousedown = dragMouseDown;
        function dragMouseDown(e) { if (e.target.classList?.contains('icon-action-btn') || e.target.classList?.contains('delete-sticker') || e.target.classList?.contains('close-widget')) return; e.preventDefault(); pos3=e.clientX; pos4=e.clientY; document.onmouseup=closeDragElement; document.onmousemove=elementDrag; element.style.zIndex='1000'; }
        function elementDrag(e) { e.preventDefault(); pos1=pos3-e.clientX; pos2=pos4-e.clientY; pos3=e.clientX; pos4=e.clientY; let newTop=Math.max(0, Math.min(element.offsetTop-pos2, window.innerHeight-100)); let newLeft=Math.max(0, Math.min(element.offsetLeft-pos1, window.innerWidth-100)); element.style.top=newTop+"px"; element.style.left=newLeft+"px"; updatePosition(type, id, newLeft, newTop); }
        function closeDragElement() { document.onmouseup=null; document.onmousemove=null; element.style.zIndex=''; saveAll(); }
    }

    function updatePosition(type, id, x, y) {
        if (type === 'icon') { const item = icons.find(i => i.id === id); if (item) { item.x = x; item.y = y; } }
        else if (type === 'folder') { const item = folders.find(f => f.id === id); if (item) { item.x = x; item.y = y; } }
        else if (type === 'sticker') { const item = stickers.find(s => s.id === id); if (item) { item.x = x; item.y = y; } }
        else if (type === 'widget') { const item = widgets.find(w => w.id === id); if (item) { item.x = x; item.y = y; } }
    }

    function openEditModal(id) { const icon = icons.find(i => i.id === id); if (!icon) return; editingIconId = id; document.getElementById('modalTitle').innerText = 'Edit Icon'; document.getElementById('iconLabel').value = icon.label; document.getElementById('iconLink').value = icon.link || ''; document.getElementById('iconImageUrl').value = icon.image || ''; document.getElementById('iconModal').style.display = 'flex'; }
    function deleteIcon(id) { if (confirm('Move to Recycle Bin?')) { const icon = icons.find(i => i.id === id); if (icon) { recycleBin.push({ ...icon, deletedAt: Date.now() }); icons = icons.filter(i => i.id !== id); saveAll(); renderAll(); } } }
    function deleteFolder(id) { if (confirm('Move folder to Recycle Bin?')) { const folder = folders.find(f => f.id === id); if (folder) { recycleBin.push({ ...folder, type: 'folder', deletedAt: Date.now() }); folders = folders.filter(f => f.id !== id); saveAll(); renderAll(); } } }

    function openFolder(id) { const folder = folders.find(f => f.id === id); if (!folder) return; let win = document.getElementById(`folder-${id}`); if (win) { win.style.display = 'block'; return; } win = document.createElement('div'); win.className = 'folder-window'; win.id = `folder-${id}`; win.style.left = '150px'; win.style.top = '150px'; win.innerHTML = `<div class="title-bar"><span>📁 ${escapeHtml(folder.name)}</span><span style="cursor:pointer" class="close-folder">✗</span></div><div class="content" id="folder-content-${id}"></div>`; document.body.appendChild(win); makeDraggable(win, id, 'window'); win.querySelector('.close-folder').addEventListener('click', () => win.remove()); const content = win.querySelector(`#folder-content-${id}`); renderFolderContents(folder, content); win.style.display = 'block'; }

    function renderFolderContents(folder, container) { container.innerHTML = ''; (folder.items || []).forEach(item => { const itemDiv = document.createElement('div'); itemDiv.className = 'folder-icon'; itemDiv.style.display = 'inline-block'; itemDiv.style.width = '80px'; const isEmoji = item.image && (item.image.length <= 4); itemDiv.innerHTML = `${isEmoji ? `<div class="icon-img">${item.image}</div>` : `<img src="${item.image}" width="32">`}<div class="icon-label">${escapeHtml(item.label)}</div>`; itemDiv.onclick = () => { if (item.link) window.location.href = item.link; }; container.appendChild(itemDiv); }); }

    function editFolderName(id) { const folder = folders.find(f => f.id === id); if (!folder) return; const newName = prompt('New folder name:', folder.name); if (newName) { folder.name = newName; saveAll(); renderAll(); } }

    function addFolder() { const name = prompt('Folder name:'); if (name) folders.push({ id: Date.now(), name: name, items: [], x: 30 + folders.length * 20, y: 30 + folders.length * 20, dateAdded: Date.now() }); saveAll(); renderAll(); }
    function addWidget() { widgets.push({ id: Date.now(), text: 'Write something...', x: 100, y: 100 }); saveAll(); renderAll(); }
    function addSticker() { const emoji = prompt('Enter emoji (e.g., 🌟, 🎵, ☕, 💭):', '🌟'); if (emoji) stickers.push({ id: Date.now(), emoji: emoji, x: Math.random() * (window.innerWidth - 100), y: Math.random() * (window.innerHeight - 200) }); saveAll(); renderAll(); }

    function showRecycleBin() { const win = document.getElementById('recycleWindow'); const content = document.getElementById('recycleContent'); content.innerHTML = recycleBin.map(item => `<div style="padding:5px; border-bottom:1px solid #ccc;">${item.label || item.name} <button onclick="restoreFromBin(${item.id})">Restore</button></div>`).join('') || '<div>Empty</div>'; win.style.display = 'block'; }
    function restoreFromBin(id) { const item = recycleBin.find(i => i.id === id); if (item) { if (item.link !== undefined) icons.push({ ...item, id: Date.now() }); else if (item.name) folders.push({ ...item, id: Date.now() }); recycleBin = recycleBin.filter(i => i.id !== id); saveAll(); renderAll(); showRecycleBin(); } }
    function emptyRecycleBin() { if (confirm('Permanently delete all items?')) { recycleBin = []; saveAll(); renderAll(); showRecycleBin(); } }

    function changeWallpaper() { const url = document.getElementById('wallpaperUrl').value; if (url) { currentWallpaper = url; document.body.style.backgroundImage = `url(${url})`; document.body.style.backgroundSize = 'cover'; saveAll(); } }
    function resetWallpaper() { currentWallpaper = ''; document.body.style.backgroundImage = ''; document.body.style.background = '#008080'; saveAll(); }
    function applyTheme() { document.body.classList.remove('theme-christmas', 'theme-halloween', 'theme-valentines', 'theme-autumn'); if (currentTheme === 'teal') document.body.style.background = '#008080'; else if (currentTheme === 'silver') document.body.style.background = '#c0c0c0'; else if (currentTheme === 'christmas') { document.body.classList.add('theme-christmas'); document.body.style.background = '#8B0000'; } else if (currentTheme === 'halloween') { document.body.classList.add('theme-halloween'); document.body.style.background = '#FF6600'; } else if (currentTheme === 'valentines') { document.body.classList.add('theme-valentines'); document.body.style.background = '#FF69B4'; } else if (currentTheme === 'autumn') { document.body.classList.add('theme-autumn'); document.body.style.background = '#B8860B'; } saveAll(); }

    function sortByName() { icons.sort((a,b) => a.label.localeCompare(b.label)); folders.sort((a,b) => a.name.localeCompare(b.name)); saveAll(); renderAll(); }
    function sortByDate() { icons.sort((a,b) => a.dateAdded - b.dateAdded); folders.sort((a,b) => a.dateAdded - b.dateAdded); saveAll(); renderAll(); }

    function showStickerBoard() { const container = document.getElementById('stickerCollection'); container.innerHTML = ''; const allStickers = ['🌟', '🎵', '☕', '💭', '🌸', '🕯️', '📖', '🧸', '✨', '🌙', '❤️', '🎨', '📷', '🌿', '🍂']; allStickers.forEach(s => { const btn = document.createElement('button'); btn.textContent = s; btn.style.fontSize = '32px'; btn.style.cursor = 'pointer'; btn.style.background = '#c0c0c0'; btn.style.border = '2px outset white'; btn.onclick = () => { stickerBoard.push(s); saveAll(); alert(`Added ${s} to your collection!`); showStickerBoard(); }; container.appendChild(btn); }); document.getElementById('stickerBoardModal').style.display = 'flex'; }

    function legacyExport() { const data = { icons, folders, stickers, widgets, recycleBin, stickerBoard, currentWallpaper, currentTheme, exportDate: new Date().toISOString() }; const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `retro-desktop-backup-${new Date().toISOString().split('T')[0]}.json`; a.click(); URL.revokeObjectURL(url); alert('Backup exported!'); }

    function checkPin() { if (pinHash) { const entered = prompt('Enter PIN to unlock:'); if (entered !== pinHash) { document.body.innerHTML = '<div style="padding:50px; text-align:center; color:white">🔒 Access Denied</div>'; return false; } } return true; }

    function savePin() { const pin = document.getElementById('pinInput').value; if (pin) { pinHash = pin; localStorage.setItem('pinHash', pin); alert('PIN saved. Refresh to lock.'); } else { alert('Enter a PIN first.'); } }
    function clearPin() { pinHash = ''; localStorage.removeItem('pinHash'); alert('PIN cleared.'); }

    function startBootScreen() { const boot = document.createElement('div'); boot.className = 'boot-screen'; boot.innerHTML = '<div>Starting Windows 95...<br><span style="font-size:12px">' + new Date().toDateString() + '</span></div>'; document.body.appendChild(boot); setTimeout(() => boot.remove(), 2500); }
    function playStartupSound() { if (document.getElementById('startupSoundToggle')?.checked) { const audio = new Audio('https://www.soundjay.com/misc/sounds/windows-startup-1.mp3'); audio.volume = 0.3; audio.play().catch(e=>console.log('Sound blocked')); } }
    function startScreensaver() { if (screensaverActive) return; screensaverActive = true; document.getElementById('screensaver').classList.add('active'); }
    function stopScreensaver() { document.getElementById('screensaver').classList.remove('active'); screensaverActive = false; resetIdleTimer(); }
    function resetIdleTimer() { clearTimeout(idleTimer); idleTimer = setTimeout(() => { if (!screensaverActive) startScreensaver(); }, 5 * 60 * 1000); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    function updateClock() { const now = new Date(); document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' }); }

    // Event Listeners
    document.getElementById('startButton').addEventListener('click', () => document.getElementById('startMenu').classList.toggle('show'));
    document.addEventListener('click', (e) => { if (!document.getElementById('startButton').contains(e.target) && !document.getElementById('startMenu').contains(e.target)) document.getElementById('startMenu').classList.remove('show'); });
    document.getElementById('addIconBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); document.getElementById('modalTitle').innerText = 'Add Icon'; editingIconId = null; document.getElementById('iconLabel').value = ''; document.getElementById('iconLink').value = ''; document.getElementById('iconImageUrl').value = ''; document.getElementById('iconModal').style.display = 'flex'; };
    document.getElementById('saveIconBtn').onclick = () => { const label = document.getElementById('iconLabel').value.trim(); if (!label) return alert('Enter a name'); const link = document.getElementById('iconLink').value.trim(); let image = document.getElementById('iconImageUrl').value.trim() || '📄'; if (editingIconId) { const idx = icons.findIndex(i => i.id === editingIconId); if (idx !== -1) { icons[idx].label = label; icons[idx].link = link || '#'; icons[idx].image = image; } } else { icons.push({ id: Date.now(), label, link: link || '#', image, x: 30 + icons.length * 20, y: 30 + icons.length * 20, dateAdded: Date.now() }); } saveAll(); renderAll(); document.getElementById('iconModal').style.display = 'none'; };
    document.getElementById('addFolderBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); addFolder(); };
    document.getElementById('addWidgetBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); addWidget(); };
    document.getElementById('addStickerBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); addSticker(); };
    document.getElementById('changeWallpaperBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); document.getElementById('wallpaperModal').style.display = 'flex'; };
    document.getElementById('setWallpaperBtn').onclick = () => { changeWallpaper(); document.getElementById('wallpaperModal').style.display = 'none'; };
    document.getElementById('resetWallpaperBtn').onclick = () => { resetWallpaper(); document.getElementById('wallpaperModal').style.display = 'none'; };
    document.getElementById('changeThemeBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); document.getElementById('themeModal').style.display = 'flex'; };
    document.getElementById('applyThemeBtn').onclick = () => { currentTheme = document.getElementById('themeSelect').value; applyTheme(); saveAll(); document.getElementById('themeModal').style.display = 'none'; };
    document.getElementById('recycleBinBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); showRecycleBin(); };
    document.getElementById('sortByNameBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); sortByName(); };
    document.getElementById('sortByDateBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); sortByDate(); };
    document.getElementById('stickerBoardBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); showStickerBoard(); };
    document.getElementById('legacyBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); legacyExport(); };
    document.getElementById('settingsBtn').onclick = () => { document.getElementById('startMenu').classList.remove('show'); document.getElementById('settingsModal').style.display = 'flex'; };
    document.getElementById('savePinBtn').onclick = savePin;
    document.getElementById('clearPinBtn').onclick = clearPin;
    document.getElementById('closeModal').onclick = () => document.getElementById('iconModal').style.display = 'none';
    document.getElementById('closeWallpaperModal').onclick = () => document.getElementById('wallpaperModal').style.display = 'none';
    document.getElementById('closeThemeModal').onclick = () => document.getElementById('themeModal').style.display = 'none';
    document.getElementById('closeSettingsModal').onclick = () => document.getElementById('settingsModal').style.display = 'none';
    document.getElementById('closeStickerBoardModal').onclick = () => document.getElementById('stickerBoardModal').style.display = 'none';
    document.getElementById('closeStickerBoardBtn').onclick = () => document.getElementById('stickerBoardModal').style.display = 'none';
    document.getElementById('closeRecycleWindow').onclick = () => document.getElementById('recycleWindow').style.display = 'none';
    document.getElementById('emptyRecycleBtn').onclick = emptyRecycleBin;
    window.restoreFromBin = restoreFromBin;
    document.getElementById('screensaver').onclick = stopScreensaver;
    document.addEventListener('mousemove', resetIdleTimer);
    document.addEventListener('keydown', resetIdleTimer);
    document.addEventListener('click', resetIdleTimer);

    // Initialization
    loadAll();
    startBootScreen();
    setTimeout(() => { if (document.getElementById('startupSoundToggle')?.checked) playStartupSound(); }, 3000);
    setInterval(updateClock, 1000);
    resetIdleTimer();
    if (pinHash && !checkPin()) throw new Error('Locked');
</script>
</body>
</html>
